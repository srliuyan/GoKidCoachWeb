name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate check mode
        shell: bash
        run: |
          set -euo pipefail
          node --check *.js
          node evaluation/run-v16-bad-move-stress.js --check --seed 20260713 --positions 907
          node evaluation/run-v161-endgame-audit.js --check --seed 20260713 --positions 300
          node evaluation/run-v162-sente-gote-audit.js --check --seed 20260713 --positions 300 --runtime-integrated
          node evaluation/run-long-game-performance.js --check

      - name: Prepare runtime artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          touch _site/.nojekyll
          cp 404.html index.html build-info.js styles.css sw.js manifest.webmanifest _site/
          cp engine-analysis.js offline-policy.js policy-pattern.js shape-library.js fuseki-library.js tactical-library.js joseki-library.js endgame-library.js opening-book.js _site/
          cp rule-engine.js position-evaluator.js midgame-stability.js context-fusion.js product-support.js student-model.js difficulty-controller.js companion-engine.js move-quality-controller.js app.js _site/
          cp -R assets _site/assets
          find _site -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
