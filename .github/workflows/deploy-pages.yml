name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate check mode
        shell: bash
        run: |
          set -euo pipefail
          node --check *.js
          node test-product-release.js
          node test-export-integrity.js
          node test-phase-transition.js
          node test-cleanup-integrity.js
          node evaluation/run-long-game-performance.js --check

      - name: Prepare runtime artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          touch _site/.nojekyll
          cp neural-prototype.html _site/index.html
          cp neural-prototype.html _site/neural-prototype.html
          cp neural-prototype.css neural-prototype.js _site/
          cp -R assets _site/assets
          cp -R engine _site/engine
          mkdir -p _site/models
          cp -R models/v3 _site/models/v3
          mkdir -p _site/vendor/onnxruntime-web
          cp -R vendor/onnxruntime-web/1.27.0 _site/vendor/onnxruntime-web/1.27.0
          find _site -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
