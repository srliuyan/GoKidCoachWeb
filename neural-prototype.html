<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>围棋陪练 V3 最高棋力</title>
  <link rel="stylesheet" href="neural-prototype.css">
</head>
<body>
  <main class="prototype-shell">
    <header>
      <p class="eyebrow">GoKidCoach V3</p>
      <h1>围棋陪练 V3 最高棋力</h1>
    </header>

    <section class="play-layout" aria-label="V3 对弈">
      <div class="board-panel">
        <canvas id="v3Board" width="900" height="900" aria-label="19路棋盘"></canvas>
      </div>
      <aside class="control-panel">
        <h2 id="gameStatus">黑棋先行，请落子</h2>
        <div class="score-row">
          <div><strong id="moveCounter">0</strong><span>手数</span></div>
          <div><strong id="engineLabel">V3</strong><span>当前AI</span></div>
        </div>
        <div class="actions compact-actions" aria-label="Game controls">
          <button id="newGameBtn" type="button">新局</button>
          <button id="passGameBtn" type="button">停一手</button>
        </div>
      </aside>
    </section>

    <section class="status-grid" aria-label="Prototype status">
      <div><span>Architecture initialized</span><strong id="architectureStatus">pending</strong></div>
      <div><span>WebGPU supported</span><strong id="webgpuStatus">checking</strong></div>
      <div><span>WebAssembly supported</span><strong id="wasmStatus">checking</strong></div>
      <div><span>Worker supported</span><strong id="workerStatus">checking</strong></div>
      <div><span>Current active engine</span><strong id="activeEngine">legacy</strong></div>
      <div><span>Fallback status</span><strong id="fallbackStatus">default_legacy</strong></div>
      <div><span>Model status</span><strong id="modelStatus">pending</strong></div>
      <div><span>MCTS status</span><strong id="mctsStatus">pending</strong></div>
    </section>

    <section class="actions" aria-label="Diagnostics">
      <button id="smokeBtn" type="button">运行一次搜索</button>
      <button id="cancelBtn" type="button">取消搜索</button>
      <button id="exportDiagnosticsBtn" type="button">导出诊断</button>
    </section>

    <pre id="diagnosticsOutput" aria-live="polite"></pre>
  </main>

  <script src="engine/ai-engine-interface.js"></script>
  <script src="engine/legacy-engine-adapter.js"></script>
  <script src="engine/neural-mcts-prototype-engine.js"></script>
  <script src="engine/engine-manager.js"></script>
  <script src="neural-prototype.js"></script>
</body>
</html>
